{% extends "solar/base.html" %}

{% block title %}Criar conta · Solar Calc{% endblock %}

{% block content %}
<div class="container" style="max-width:480px; padding-top:3rem">
  <div class="card">
    <div class="section-title">Criar conta</div>
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
        <div class="field" style="margin-bottom:1rem">
          <label>{{ field.label }}</label>
          {{ field }}
          {% if field.errors %}
            <small style="color:var(--red)">{{ field.errors.0 }}</small>
          {% endif %}
        </div>
      {% endfor %}
      <button type="submit" class="btn" style="margin-top:1rem">
        Criar conta
      </button>
    </form>
  </div>
</div>
{% endblock %}
